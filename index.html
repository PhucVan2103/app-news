    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, setDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ----- CẤU HÌNH FIREBASE -----
        const fallbackConfig = {
            apiKey: "AIzaSyBKwQS1CCijxX8fFEyslXFSn5WAXJBKNTM",
            authDomain: "app-news-855c6.firebaseapp.com",
            projectId: "app-news-855c6",
            storageBucket: "app-news-855c6.firebasestorage.app",
            messagingSenderId: "740136197166",
            appId: "1:740136197166:web:6aba89e9723293160a53bf"
        };
        
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : fallbackConfig;
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'app-news-855c6';

        let currentUser = null;
        let lessonsDb = [];
        let currentLessonIndex = 0;
        let lessonData = [];
        let unsubscribeLessons = null;
        let isPlayingAll = false;
        let currentPlayAllIndex = 0;
        let nhkSyncInterval = null; 
        let isSyncingNews = false;
        let isAutoSyncStarted = false; 
        
        // ĐIỀN GEMINI API KEY VÀO ĐÂY KHI CHẠY Ở LOCAL/VERCEL
        const apiKey = "AIzaSyDx7kbKeDxxvJ6idb9R0MEuZMZcjE4yn5o"; 
        
        // TỰ ĐỘNG CHỌN MÔ HÌNH: Nếu có API key người dùng, dùng bản 1.5 public, nếu chạy nội bộ Canvas thì dùng bản preview
        const textModel = apiKey !== "" ? "gemini-1.5-flash" : "gemini-2.5-flash-preview-09-2025";
        
        window.uploadedImageData = ''; 

        // Khai báo bảng màu chủ đề
        const TOPIC_STYLES = {
            'Thể Thao': 'bg-blue-100 text-blue-700 border-blue-200',
            'Công nghệ': 'bg-purple-100 text-purple-700 border-purple-200',
            'Đời sống': 'bg-green-100 text-green-700 border-green-200',
            'Công ty': 'bg-slate-200 text-slate-700 border-slate-300',
            'Tin thế giới': 'bg-red-100 text-red-700 border-red-200',
            'Tin tức': 'bg-sky-100 text-sky-700 border-sky-200',
            'Khác': 'bg-gray-100 text-gray-600 border-gray-200'
        };

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Lỗi xác thực:", error);
                document.getElementById('lessonTitle').innerText = "Lỗi xác thực Firebase";
                document.getElementById('lessonMeta').innerHTML = `<span class="text-red-500 font-medium">Vui lòng kiểm tra lại API Key hoặc bật Đăng nhập Ẩn danh</span>`;
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                setupFirestoreListener();
            } else {
                if (unsubscribeLessons) unsubscribeLessons();
                if (nhkSyncInterval) clearInterval(nhkSyncInterval);
            }
        });

        function setupFirestoreListener() {
            const lessonsRef = collection(db, 'artifacts', appId, 'public', 'data', 'lessons');
            unsubscribeLessons = onSnapshot(lessonsRef, (snapshot) => {
                const fetchedLessons = [];
                snapshot.forEach(doc => { fetchedLessons.push({ ...doc.data(), _docId: doc.id }); });
                fetchedLessons.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));

                if (fetchedLessons.length === 0) {
                    DEFAULT_LESSONS.forEach(async (lesson) => { await addDoc(lessonsRef, { ...lesson, createdAt: Date.now() }); });
                } else {
                    lessonsDb = fetchedLessons;
                    if (currentLessonIndex >= lessonsDb.length) currentLessonIndex = 0;
                    
                    if (lessonsDb.length > 0) {
                        loadCurrentLesson();
                        const grid = document.getElementById('lessonGrid');
                        if (grid) renderLibraryList();
                    } else {
                        document.getElementById('lessonTitle').innerText = "Chưa có bài học nào";
                    }

                    if (!isAutoSyncStarted) {
                        isAutoSyncStarted = true;
                        startNHKAutoSync();
                    }
                }
            }, (error) => {
                console.error("Lỗi Database:", error);
                document.getElementById('lessonTitle').innerText = "Lỗi kết nối Database";

        async function fetchAndProcessNHKNews() {
            if (!currentUser || isSyncingNews) return { status: 'error', message: 'Hệ thống đang bận xử lý' };
            
            isSyncingNews = true;
            updateSyncStatus(true);

            try {
                const rssFeeds = [
                    'https://www.nhk.or.jp/rss/news/cat3.xml', // Khoa học/Công nghệ
                    'https://www.nhk.or.jp/rss/news/cat7.xml', // Thể thao
                    'https://www.nhk.or.jp/rss/news/cat6.xml', // Quốc tế
                    'https://www.nhk.or.jp/rss/news/cat0.xml'  // Tin chính
                ];
                const targetRss = rssFeeds[Math.floor(Math.random() * rssFeeds.length)];
                const rssUrl = `https://api.rss2json.com/v1/api.json?rss_url=${targetRss}`;
                
                const response = await fetch(rssUrl);
                if (!response.ok) throw new Error("Không thể tải RSS");
                const data = await response.json();
                
                if (!data.items || data.items.length === 0) {
                    isSyncingNews = false; updateSyncStatus(false);
                    return { status: 'no_news', message: 'Nguồn tin hiện không có dữ liệu' };
                }

                let newArticle = null;
                for (const item of data.items) {
                    const rawTitle = item.title.split(' |')[0].trim();
                    const cleanTitle = `Bản tin NHK: ${rawTitle}`;
                    
                    const isDuplicate = lessonsDb.some(l => {
                        if (!l.title) return false;
                        if (l.sourceLink && item.link && l.sourceLink === item.link) return true;
                        
                        const existingTitle = l.title.trim().toLowerCase();
                        const newTitle = cleanTitle.toLowerCase();
                        if (existingTitle === newTitle) return true;
                        
                        const baseExisting = existingTitle.replace('bản tin nhk: ', '').trim();
                        const baseNew = rawTitle.toLowerCase().trim();
                        if (baseExisting.length > 15 && baseNew.length > 15 && 
                            (baseExisting.includes(baseNew) || baseNew.includes(baseExisting))) {
                            return true;
                        }
                        return false;
                    });

                    if (!isDuplicate) {
                        newArticle = { ...item, cleanTitle };
                        break; 
                    }
                }

                if (!newArticle) {
                    isSyncingNews = false; updateSyncStatus(false);
                    return { status: 'no_news', message: 'Tất cả tin tức trên NHK hiện tại đều đã được tải về Thư viện.' }; 
                }

                const rawText = `${newArticle.title}。\n${newArticle.description}`;

                const prompt = `Xử lý bản tin tiếng Nhật sau (đây là tin tức, không phải hội thoại). 
Yêu cầu 1 (dialogues): Phân tách và mở rộng bản tin thành TỐI THIỂU 4 CÂU (nếu văn bản gốc quá ngắn, hãy tự viết thêm các chi tiết bổ sung hợp lý dựa trên bối cảnh để đảm bảo có đủ 4 câu trở lên). "speaker" LUÔN LÀ "NHK NEWS". "japanese" bọc Kanji bằng <ruby> và <rt>. "plainText" là câu gốc. Dịch "vietnamese" tự nhiên mang văn phong báo chí.
Yêu cầu 2 (vocabulary): Trích xuất 10-15 từ vựng quan trọng CÓ XUẤT HIỆN TRONG BẢN TIN. Ưu tiên trích xuất các cụm từ Kanji và cụm từ Katakana.
Yêu cầu 3 (imagePrompt): Viết 1 câu miêu tả ngắn gọn bối cảnh tin tức bằng tiếng Anh để làm prompt vẽ tranh AI.
Yêu cầu 4 (level): Đánh giá cấp độ JLPT phù hợp nhất (chỉ chọn: N5, N4, N3, N2, N1).
Yêu cầu 5 (topic): Phân loại chủ đề (chỉ chọn 1 trong: Thể Thao, Công nghệ, Đời sống, Công ty, Tin thế giới, Khác). Cực kỳ ưu tiên chọn "Công nghệ" hoặc "Thể Thao" nếu nội dung có liên quan.
Bản tin:\n${rawText}`;
                
                const payload = { 
                    contents: [{ parts: [{ text: prompt }] }], 
                    generationConfig: { 
                        responseMimeType: "application/json", 
                        responseSchema: { 
                            type: "OBJECT", 
                            properties: { 
                                dialogues: { type: "ARRAY", items: { type: "OBJECT", properties: { time: { type: "INTEGER" }, speaker: { type: "STRING" }, japanese: { type: "STRING" }, plainText: { type: "STRING" }, romaji: { type: "STRING" }, vietnamese: { type: "STRING" } }, required: ["speaker", "japanese", "plainText", "romaji", "vietnamese"] } }, 
                                vocabulary: { type: "ARRAY", items: { type: "OBJECT", properties: { word: { type: "STRING" }, kana: { type: "STRING" }, romaji: { type: "STRING" }, meaning: { type: "STRING" } }, required: ["word", "kana", "romaji", "meaning"] } },
                                imagePrompt: { type: "STRING" },
                                level: { type: "STRING" },
                                topic: { type: "STRING" }
                            }, 
                            required: ["dialogues", "vocabulary", "level", "topic"] 
                        } 
                    } 
                };

                const geminiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${textModel}:generateContent?key=${apiKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (!geminiRes.ok) throw new Error("Lỗi API phân tích bản tin");
                const aiData = JSON.parse((await geminiRes.json()).candidates[0].content.parts[0].text);

                let finalImageUrl = '';
                if (aiData.imagePrompt) {
                    finalImageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(aiData.imagePrompt + ', high quality news photography, realistic, Japan')}?width=1280&height=720&nologo=true`;
                }

                const safeDocId = 'nhk_' + newArticle.link.replace(/[^a-zA-Z0-9]/g, '');
                
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lessons', safeDocId), { 
                    title: newArticle.cleanTitle, 
                    level: aiData.level || 'N3', 
                    topic: aiData.topic || 'Tin thế giới', 
                    tags: ['NHK', 'Auto-Sync'], 
                    videoId: '', 
                    imageUrl: finalImageUrl,
                    dialogues: aiData.dialogues || [], 
                    vocabulary: aiData.vocabulary || [], 
                    createdAt: Date.now(),
                    sourceLink: newArticle.link
                });

                isSyncingNews = false; updateSyncStatus(false);
                return { status: 'success', message: 'Tải thành công tin tức mới!' };

            } catch (error) {
                console.error("Lỗi Auto-Sync NHK:", error);
                isSyncingNews = false; updateSyncStatus(false);
                return { status: 'error', message: error.message };
            }
        }

        function initPlayer(videoId, imageUrl) {
            const noVideoMsg = document.getElementById('noVideoMsg');
            const lessonImg = document.getElementById('lessonImage');
            const videoEl = document.getElementById('mainVideo');
            const imagePlaceholder = document.getElementById('imagePlaceholder');

            if (!videoId && imageUrl) {
                if (imagePlaceholder) imagePlaceholder.classList.remove('hidden');
                if (lessonImg) { 
                    lessonImg.classList.add('hidden'); 
                    lessonImg.onload = () => {
                        lessonImg.classList.remove('hidden');
                        if (imagePlaceholder) imagePlaceholder.classList.add('hidden');
                    };
                    lessonImg.src = imageUrl; 
                    if (lessonImg.complete) lessonImg.onload();
                }
                if (videoEl) videoEl.classList.add('hidden');
                if (noVideoMsg) noVideoMsg.style.display = 'none';
                if (player && typeof player.stopVideo === 'function') player.stopVideo();
                return;
            } else {
                if (lessonImg) lessonImg.classList.add('hidden');
                if (imagePlaceholder) imagePlaceholder.classList.add('hidden');
                if (videoEl) videoEl.classList.remove('hidden');
            }

            if (!window.YT || !window.YT.Player) {
                if (videoId) setTimeout(() => initPlayer(videoId, imageUrl), 500);
                return;
            }

            if (player) {
                if (typeof player.loadVideoById === 'function') {
                    if(videoId) { player.loadVideoById(videoId); if (noVideoMsg) noVideoMsg.style.display = 'none'; } 
                    else { if (typeof player.stopVideo === 'function') player.stopVideo(); if (noVideoMsg) noVideoMsg.style.display = 'flex'; }
                } else setTimeout(() => initPlayer(videoId, imageUrl), 500);
                return;
            }

            if(videoId) {
                player = new YT.Player('mainVideo', {
                    videoId: videoId, playerVars: { 'playsinline': 1, 'rel': 0 }, events: { 'onStateChange': onPlayerStateChange }
                });
                if (noVideoMsg) noVideoMsg.style.display = 'none';
            } else {
                if (noVideoMsg) noVideoMsg.style.display = 'flex';
            }
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                if (typeof window.stopPlayAll === 'function') window.stopPlayAll();
                timeTracker = setInterval(() => {
                    if(player && typeof player.getCurrentTime === 'function') highlightTranscript(player.getCurrentTime());
                }, 500);
            } else clearInterval(timeTracker);
        }

        function seekTo(seconds) {
            if (player && typeof player.seekTo === 'function') {
                player.seekTo(seconds, true); 
                if (typeof player.playVideo === 'function') player.playVideo();
            }
            highlightTranscript(seconds);
        }

        // ----- XỬ LÝ ẢNH UPLOAD/PASTE -----
        window.handleImageUpload = function(event) {
            const file = event.target.files[0];
            if (file) window.processImageFile(file);
        };

        window.handlePaste = function(e) {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file' && item.type.includes('image/')) {
                    const blob = item.getAsFile();
                    window.processImageFile(blob);
                }
            }
        };

        window.processImageFile = function(file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; const MAX_HEIGHT = 800;
                    let width = img.width; let height = img.height;

                    if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                    else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                    
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    
                    document.getElementById('imagePreview').src = dataUrl;
                    document.getElementById('imagePreviewContainer').classList.remove('hidden');
                    document.getElementById('newLessonImage').value = ''; 
                    window.uploadedImageData = dataUrl;
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        };

        window.clearImagePreview = function() {
            document.getElementById('imagePreview').src = '';
            document.getElementById('imagePreviewContainer').classList.add('hidden');
            document.getElementById('fileUpload').value = '';
            document.getElementById('newLessonImage').value = '';
            window.uploadedImageData = '';
        };

        // ----- AI TẠO BÀI HỌC TỪ MANUAL TEXT -----
        window.analyzeAndCreateLesson = async function() {
            if (!currentUser) return alert("Đang kết nối Database!");
            const title = document.getElementById('newLessonTitle').value.trim() || 'Bài học AI';
            const rawText = document.getElementById('rawJapaneseText').value.trim();
            const levelHint = document.getElementById('newLessonLevel').value.trim();
            const videoId = document.getElementById('newLessonVideo').value.trim();
            const inputImageUrl = document.getElementById('newLessonImage').value.trim();
            const btn = document.getElementById('btnAnalyze');
            const err = document.getElementById('analyzeError');

            if (!rawText) { err.innerText = "Chưa nhập nội dung!"; err.classList.remove('hidden'); return; }
            err.classList.add('hidden'); btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang tạo...'; btn.disabled = true;

            try {
                const prompt = `Phân tích đoạn hội thoại/văn bản tiếng Nhật sau. 
Yêu cầu 1 (dialogues): Trích xuất từng câu. "japanese" bọc Kanji bằng <ruby> và <rt>. "plainText" là câu gốc. Dịch "vietnamese" tự nhiên. Nếu không có người nói, dùng "Text" làm speaker.
Yêu cầu 2 (vocabulary): Trích xuất 10-15 từ vựng quan trọng CÓ XUẤT HIỆN TRONG VĂN BẢN. Ưu tiên trích xuất các cụm từ Kanji và cụm từ Katakana.
Yêu cầu 3 (imagePrompt): Viết 1 câu tiếng Anh miêu tả bối cảnh để vẽ tranh AI.
Yêu cầu 4 (level): Đánh giá cấp độ JLPT phù hợp nhất dựa trên nội dung (chỉ chọn: N5, N4, N3, N2, N1).
Yêu cầu 5 (topic): Phân loại chủ đề (chọn 1 trong: Thể Thao, Công nghệ, Đời sống, Công ty, Tin thế giới, Khác).
Hội thoại:\n${rawText}`;
                
                const payload = { 
                    contents: [{ parts: [{ text: prompt }] }], 
                    generationConfig: { 
                        responseMimeType: "application/json", 
                        responseSchema: { 
                            type: "OBJECT", 
                            properties: { 
                                dialogues: { type: "ARRAY", items: { type: "OBJECT", properties: { time: { type: "INTEGER" }, speaker: { type: "STRING" }, japanese: { type: "STRING" }, plainText: { type: "STRING" }, romaji: { type: "STRING" }, vietnamese: { type: "STRING" } }, required: ["speaker", "japanese", "plainText", "romaji", "vietnamese"] } }, 
                                vocabulary: { type: "ARRAY", items: { type: "OBJECT", properties: { word: { type: "STRING" }, kana: { type: "STRING" }, romaji: { type: "STRING" }, meaning: { type: "STRING" } }, required: ["word", "kana", "romaji", "meaning"] } },
                                imagePrompt: { type: "STRING" },
                                level: { type: "STRING" },
                                topic: { type: "STRING" }
                            }, 
                            required: ["dialogues", "vocabulary", "level", "topic"] 
                        } 
                    } 
                };

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${textModel}:generateContent?key=${apiKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (!response.ok) throw new Error("Lỗi API phân tích");
                const aiData = JSON.parse((await response.json()).candidates[0].content.parts[0].text);

                let customImage = window.uploadedImageData || inputImageUrl;
                let finalImageUrl = customImage;

                if (!finalImageUrl && !videoId && aiData.imagePrompt) {
                    finalImageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(aiData.imagePrompt + ', beautiful anime style illustration, highly detailed, Japan')}?width=1280&height=720&nologo=true`;
                }

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'lessons'), { 
                    title, 
                    level: levelHint || aiData.level || 'N3', 
                    topic: aiData.topic || 'Khác', 
                    tags: ['AI'], 
                    videoId, 
                    imageUrl: finalImageUrl,
                    dialogues: aiData.dialogues || [], 
                    vocabulary: aiData.vocabulary || [], 
                    createdAt: Date.now() 
                });

                document.getElementById('rawJapaneseText').value = ''; document.getElementById('newLessonTitle').value = ''; document.getElementById('newLessonVideo').value = '';
                window.clearImagePreview();
                setTimeout(() => { window.selectLesson(lessonsDb.length - 1); }, 800);
            } catch (error) { err.innerText = "Lỗi: " + error.message; err.classList.remove('hidden'); } 
            finally { btn.innerHTML = '<i class="fas fa-magic"></i> Phân tích & Tạo bài học'; btn.disabled = false; }
        }

        // ----- AUDIO -----
        const audioCache = {};
        let currentAudio = null;

        async function fetchTTSAudio(text, speaker) {
            if (apiKey !== "") {
                // Nếu dùng key cá nhân thì văng lỗi để rơi thẳng vào Catch và bật trình duyệt đọc.
                throw new Error("TTS API is only available in Canvas environment");
            }
            
            const voiceName = (speaker.toLowerCase().includes('sato') || speaker.toLowerCase().includes('bác sĩ') || speaker.toLowerCase().includes('nam') || speaker.toLowerCase() === 'a' || speaker.toLowerCase().includes('buchou') || speaker.toLowerCase().includes('suzuki') || speaker.toLowerCase().includes('yamada') || speaker.toLowerCase() === 'nhk news') && speaker !== 'Vocab' && speaker !== 'Example' ? 'Fenrir' : 'Kore'; 
            
            let promptText = `Say naturally in Japanese: ${text}`;
            if (speaker === 'Vocab') promptText = `Pronounce this Japanese word clearly and correctly: ${text}`;
            else if (speaker === 'Example') promptText = `Read this Japanese sentence clearly and naturally: ${text}`;

            const payload = { contents: [{ parts: [{ text: promptText }] }], generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName } } } } };
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const inlineData = (await response.json()).candidates?.[0]?.content?.parts?.[0]?.inlineData;
            if (inlineData) {
                const pcmData = base64ToPcm(inlineData.data);
                return URL.createObjectURL(pcmToWav(pcmData, 24000));
            }
            throw new Error("Lỗi Audio");
        }

        async function preloadAllAudio() {
            if(!lessonData) return;
            for (const item of lessonData) {
                const cacheKey = `${item.speaker}_${item.plainText}`;
                if (!audioCache[cacheKey]) {
                    try { audioCache[cacheKey] = await fetchTTSAudio(item.plainText, item.speaker); await new Promise(r => setTimeout(r, 1000)); } catch (e) { }
                }
            }
        }

        window.manualSpeak = function(text, speaker, btnId) {
            window.stopPlayAll(); window.speakJapaneseNatural(text, speaker, btnId);
        }

        window.speakJapaneseNatural = async function(text, speaker, buttonId) {
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            window.speechSynthesis.cancel(); 
            const cacheKey = `${speaker}_${text}`;
            const btn = document.getElementById(buttonId);
            const originalIcon = '<i class="fas fa-volume-up text-xs"></i>';

            if (audioCache[cacheKey]) return playAudio(audioCache[cacheKey], btn, originalIcon);
            if (btn) { btn.innerHTML = '<i class="fas fa-spinner fa-spin text-xs"></i>'; btn.classList.add('text-indigo-500'); }

            try {
                audioCache[cacheKey] = await fetchTTSAudio(text, speaker); return await playAudio(audioCache[cacheKey], btn, originalIcon);
            } catch (error) {
                if (btn) { btn.innerHTML = originalIcon; btn.classList.remove('text-indigo-500'); }
                return new Promise((resolve) => {
                    if ('speechSynthesis' in window) { const u = new SpeechSynthesisUtterance(text); u.lang = 'ja-JP'; u.onend = resolve; u.onerror = resolve; window.speechSynthesis.speak(u); } else resolve();
                });
            }
        }

        function playAudio(url, btn, originalIcon) {
            return new Promise((resolve) => {
                currentAudio = new Audio(url);
                if (btn) { btn.innerHTML = originalIcon; btn.classList.add('text-indigo-600', 'animate-pulse'); }
                currentAudio.onended = currentAudio.onerror = () => { if(btn) btn.classList.remove('text-indigo-600', 'animate-pulse'); resolve(); };
                currentAudio.play().catch(() => resolve());
            });
        }

        window.togglePlayAll = function() { if (isPlayingAll) window.stopPlayAll(); else startPlayAll(); };

        function startPlayAll() {
            if (!lessonData || lessonData.length === 0) return;
            isPlayingAll = true; currentPlayAllIndex = 0;
            const btn = document.getElementById('btn-play-all');
            if(btn) { btn.innerHTML = '<i class="fas fa-stop text-red-500"></i> <span class="text-red-700">Dừng</span>'; btn.classList.replace('bg-indigo-50', 'bg-red-50'); }
            if (player && typeof player.pauseVideo === 'function') player.pauseVideo();
            playNextDialogue();
        }

        window.stopPlayAll = function() {
            isPlayingAll = false;
            if (currentAudio) { currentAudio.pause(); } window.speechSynthesis.cancel();
            const btn = document.getElementById('btn-play-all');
            if (btn) { btn.innerHTML = '<i class="fas fa-play text-indigo-500"></i> Nghe toàn bộ'; btn.classList.replace('bg-red-50', 'bg-indigo-50'); }
        };

        async function playNextDialogue() {
            if (!isPlayingAll || currentPlayAllIndex >= lessonData.length) { window.stopPlayAll(); return; }
            highlightTranscript(lessonData[currentPlayAllIndex].time || 0);
            try { await window.speakJapaneseNatural(lessonData[currentPlayAllIndex].plainText, lessonData[currentPlayAllIndex].speaker, `btn-speak-${currentPlayAllIndex}`); } catch (e) {}
            if (isPlayingAll) { currentPlayAllIndex++; setTimeout(() => { if(isPlayingAll) playNextDialogue(); }, 600); }
        }

        function base64ToPcm(b) { const s = window.atob(b), a = new Uint8Array(s.length); for (let i=0; i<s.length; i++) a[i]=s.charCodeAt(i); return new Int16Array(a.buffer); }
        function pcmToWav(p, r) { const b=new ArrayBuffer(44+p.byteLength), v=new DataView(b), w=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))}; w(0,'RIFF');v.setUint32(4,36+p.byteLength,true);w(8,'WAVE');w(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);v.setUint32(24,r,true);v.setUint32(28,r*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);w(36,'data');v.setUint32(40,p.byteLength,true); let o=44;for(let i=0;i<p.length;i++,o+=2)v.setInt16(o,p[i],true); return new Blob([v],{type:'audio/wav'}); }
        function formatTime(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }

        window.onload = () => { const t = document.createElement('script'); t.src = "https://www.youtube.com/iframe_api"; document.head.appendChild(t); };
    </script>
